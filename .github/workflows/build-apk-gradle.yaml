name: Build Android APK
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repo URL'
        required: true
        default: 'https://github.com/neilisaac/AndroidSettlers'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder
        uses: actions/checkout@v4
      
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'  # Ant needs Java 11, not 17
      
      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant
      
      - name: Clone target repo
        run: git clone ${{ github.event.inputs.repo_url }} app
      
      - name: Build with Ant
        run: |
          cd app
          ant debug  # This builds the APK using Ant
      
      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/bin/*-debug.apk  # Ant's output folder
